{
  "services": [
    {
      "type": "web",
      "name": "hk-math-portal",
      "env": "python",
      "buildCommand": "pip install -r requirements.txt && python migrate_render.py",
      "startCommand": "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120",
      "envVars": [
        {
          "key": "PYTHON_VERSION",
          "value": "3.11"
        },
        {
          "key": "FRELLMAPI_URL",
          "value": "http://localhost:3001/v1"
        },
        {
          "key": "FRELLMAPI_KEY",
          "value": "frellmapi-a4fc69d7fa5ca8504930131b70d7b0cfdf6d0b09abe941ce"
        },
        {
          "key": "DATABASE_URL",
          "fromDatabase": {
            "name": "hk-math-db",
            "property": "connectionString"
          }
        }
      ]
    }
  ],
  "databases": [
    {
      "name": "hk-math-db",
      "plan": "free",
      "databaseName": "question_bank"
    }
  ]
}